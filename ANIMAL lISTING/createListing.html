<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Animal Listing</title>
    <link rel="stylesheet" href="stylesAnimalListing.css">
</head>
<body>

<nav>
    <h2>Animal Adoption System</h2>
    <div>
        <a href="animalListingIndex.html">Home</a>
        <a href="createListing.html">Create Listing</a>
        <a href="adminListing.html">Admin Panel</a>
    </div>
</nav>

<div class="container">
    <h2>Create New Animal Listing</h2>

    <form>
        <label>Animal Type:</label>
        <select required>
            <option disabled selected>Select Type</option>
            <option>Dog</option>
            <option>Cat</option>
            <option>Rabbit</option>
        </select>

        <label>Age (in years):</label>
        <input type="number" required>

        <label>Location (Shelter name / City):</label>
        <input type="text" required>

        <label>Vaccination Status:</label>
        <select required>
            <option>Yes</option>
            <option>No</option>
        </select>

        <label>Additional Notes:</label>
        <textarea rows="4"></textarea>

        <button type="submit">Submit Listing (Pending Approval)</button>
    </form>
</div>

</body>
</html>
